<div class="card" [ngClass]="{
    'create-mode': isCreate,
    'progress-mode': isProgress
  }" 
  [style.backgroundImage]="'url(' + card.urlImagem + ')'"
>

  <div class="overlay">

    <!-- CREATE -->
    @if(isCreate) {
      <ng-container>
        <div class="create">
          <div class="icon">
            <ion-icon name="add-outline"></ion-icon>
          </div>
          <span>{{ card.titulo }}</span>
        </div>
      </ng-container>
    }

    <!-- PROGRESS -->
    @if(isProgress) {
      <ng-container>
        <div class="progress">
          <span class="subtitle" *ngIf="card.subtitulo">
            {{ card.subtitulo }}
          </span>

          <h3>{{ card.titulo }}</h3>
        </div>
      </ng-container>
    }
  </div>

</div>
